version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"   # WebSocket + REST
      - "5353:5353/udp"  # DNS covert channel
    environment:
      - C2_HOST=0.0.0.0
      - C2_PORT=8000
      - C2_DNS_PORT=5353
      - C2_LOG_LEVEL=INFO
      - OPERATOR_TOKEN=${OPERATOR_TOKEN:-openc2-dev-token}
      - DASHBOARD_ORIGIN=http://localhost:5173
    volumes:
      - ./server/keys:/app/keys  # persistir claves RSA entre reinicios
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # Agente de demo que se conecta automáticamente al servidor
  agent-demo:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      - C2_SERVER=ws://server:8000/ws
      - AGENT_LOG_LEVEL=INFO
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
